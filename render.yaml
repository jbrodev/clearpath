services:
  - type: web
    name: clearpath
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn clearpath.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLEARPATH_BASE_URL
        sync: false
    healthCheckPath: /health
